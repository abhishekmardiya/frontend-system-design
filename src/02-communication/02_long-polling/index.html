<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Long Polling</title>
  </head>
  <body>
    <h1>Long Polling</h1>
    <div id="container"></div>

    <script>
      const getData = async (lastData) => {
        try {
          const response = await fetch(`/getData?lastData=${lastData}`);
          const result = await response.json();

          document.getElementById("container").innerHTML = result.data;

          // we fire next request only if we get new data
          // if we don't get new data, we keep the request open
          // and wait for the server to push new data
          getData(result.data);
        } catch (e) {
          console.log(e);
        }
      };

      // fire the first request (for first request, we don't have any lastData).
      getData();
    </script>
  </body>
</html>
