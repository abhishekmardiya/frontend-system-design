<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="http://unsecure.com/abc.js"></script>

    <!-- trusted inline scripts -->
    <!-- The nonce is not visible in the page source (View Source), but is applied at runtime in the DOM -->
    <!-- The nonce is a unique value that is generated by the server for each request (we have hardcode it for demo purpose)-->
    <script nonce="randomKey">
      console.log("My trusted code!");
    </script>

    <!-- untrusted inline scripts -->
    <script>
      console.log("My untrusted code!");
    </script>
  </head>
  <body>
    <h1>CSP Demo Page</h1>
    <figure>
      <img
        src="https://images.pexels.com/photos/33880071/pexels-photo-33880071.jpeg"
        alt="Scenic ocean view through a coastal archway"
        width="500"
        height="500"
      />
      <figcaption>
        <small>
          Photo by
          <a
            href="https://www.pexels.com/photo/scenic-ocean-view-through-coastal-archway-33880071/"
            rel="noopener noreferrer"
            >Yunus Kılıç</a
          >
          on
          <a href="https://www.pexels.com/" rel="noopener noreferrer">Pexels</a>
        </small>
      </figcaption>
    </figure>
  </body>
</html>
