<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic JavaScript Injection</title>
  </head>
  <body>
    <h1>Dynamic JavaScript Injection</h1>

    <label for="jsCode">Enter JavaScript code:</label>
    <br />
    <br />

    <textarea
      type="text"
      id="jsCode"
      placeholder="Enter JavaScript code here (e.g. alert('XSS Attack'))"
      style="width: 30rem"
      rows="10"
    ></textarea>
    <br />

    <button onclick="executeCode()">Execute Code</button>

    <script>
      const executeCode = () => {
        var jsCode = document.getElementById("jsCode").value;

        try {
          // Use eval to execute the entered JavaScript code
          eval(jsCode);
        } catch (error) {
          console.error("Error executing code:", error);
        }
      };
    </script>
  </body>
</html>
